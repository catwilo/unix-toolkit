# ~/.config/aicli/config.yaml
# Copy from config.example.yaml and edit — passwords are NEVER stored here.

default_ai: claude
default_scope: general

accounts:
  - id: personal-1
    email: user@gmail.com       # Reference only — no credential stored here
    priority: 1
    ais: [claude, chatgpt, gemini]

  - id: personal-2
    email: user2@gmail.com
    priority: 2
    ais: [claude, gemini]

  - id: work-1
    email: user@work.com
    priority: 3
    ais: [claude, gemini]

memory:
  max_inject_tokens: 8000       # Max tokens of memory injected per session start
  auto_compress: true
  compress_after_messages: 30
  snapshot_on_migrate: true

migration:
  auto_detect: true             # Detect limit automatically
  auto_propose: true            # Propose migration — NEVER auto-execute without user confirm
  preserve:
    - pinned_memory
    - project_state
    - active_files
    - objectives
    - constraints

ai_limits:
  claude:
    free_messages_per_window: 5
    window_hours: 4
  chatgpt:
    free_messages_per_window: 10
    window_hours: 3
  gemini:
    free_messages_per_window: 20
    window_hours: 1

output:
  format: markdown              # markdown | plain | json
  render: glow                  # glow | cat | less
  stream: true

browser:
  type: chrome                  # chrome | brave | chromium
  headless: true
  profiles_dir: ~/.local/share/aicli/profiles

logging:
  level: info                   # debug | info | warn | error
  dir: ~/.local/share/aicli/logs
  max_size_mb: 10
  max_files: 5
